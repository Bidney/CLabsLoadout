<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800">
  <rect width="1280" height="800" fill="#f3f7ff"/>
  <text x="640" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="50" font-weight="700" fill="#16233f">Fast to launch. Private by design.</text>
  <text x="640" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#586782">No account, analytics, ads, or external network requests.</text>
  <g transform="translate(120 230)" font-family="Arial, sans-serif">
    <rect width="1040" height="126" rx="22" fill="#fff" stroke="#d8e1ef" stroke-width="2"/>
    <text x="34" y="42" font-size="16" font-weight="700" fill="#67748a">CHROME ADDRESS BAR</text>
    <rect x="34" y="58" width="972" height="46" rx="23" fill="#f0f4fa"/>
    <rect x="49" y="67" width="42" height="28" rx="7" fill="#3d7df0"/><text x="61" y="87" font-size="15" font-weight="700" fill="#fff">lo</text>
    <text x="110" y="88" font-size="18" fill="#1e2c45">incident response</text>
    <text x="804" y="88" font-size="15" fill="#74829a">Open loadout · 8 tabs</text>
  </g>
  <g transform="translate(120 410)" font-family="Arial, sans-serif">
    <g><rect width="318" height="230" rx="20" fill="#fff" stroke="#d8e1ef"/><circle cx="50" cy="52" r="24" fill="#e1ecff"/><path d="M40 53h20m-10-10v20" stroke="#3d7df0" stroke-width="4" stroke-linecap="round"/><text x="30" y="105" font-size="22" font-weight="700" fill="#1c2943">Capture a window</text><text x="30" y="140" font-size="16" fill="#60708a">Turn your current browser</text><text x="30" y="165" font-size="16" fill="#60708a">setup into a reusable loadout.</text></g>
    <g transform="translate(361 0)"><rect width="318" height="230" rx="20" fill="#fff" stroke="#d8e1ef"/><circle cx="50" cy="52" r="24" fill="#e8fff5"/><path d="M39 52h17m-6-7 7 7-7 7" fill="none" stroke="#1eac75" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><text x="30" y="105" font-size="22" font-weight="700" fill="#1c2943">Launch anywhere</text><text x="30" y="140" font-size="16" fill="#60708a">Use the popup, address bar,</text><text x="30" y="165" font-size="16" fill="#60708a">context menu, or shortcut.</text></g>
    <g transform="translate(722 0)"><rect width="318" height="230" rx="20" fill="#fff" stroke="#d8e1ef"/><circle cx="50" cy="52" r="24" fill="#f2e8ff"/><path d="M39 52 47 60 62 43" fill="none" stroke="#9854e8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><text x="30" y="105" font-size="22" font-weight="700" fill="#1c2943">Keep control</text><text x="30" y="140" font-size="16" fill="#60708a">Readable JSON backups and</text><text x="30" y="165" font-size="16" fill="#60708a">Chrome-managed sync storage.</text></g>
  </g>
</svg>
