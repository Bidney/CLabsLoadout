      <circle cx="42" cy="132" r="7" fill="#3d7df0"/><text x="63" y="139" font-size="17" fill="#43516b">Focused instead of duplicated</text>
      <circle cx="42" cy="172" r="7" fill="#3d7df0"/><text x="63" y="179" font-size="17" fill="#43516b">Closed safely when the task is done</text>
