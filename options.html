<!doctype html>
<html><head><meta charset="utf-8">
<title>CLabs Loadout settings</title>
<style>
  body { font: 14px system-ui; padding: 24px; max-width: 480px; }
  h2 { margin-top: 0; }
  label { display:block; margin: 10px 0; }
  select { padding: 6px; }
  #status { color:#059669; font-size:12px; visibility:hidden; }
</style></head>
<body>
  <h2>CLabs Loadout</h2>
  <label>
    Open loadouts in

      <option value="newWindow">a new window</option>

    </select>
  </label>
  <p id="status">Saved</p>
  <script src="options.js"></script>
</body></html>
